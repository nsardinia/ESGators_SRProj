; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:arduino_nano_esp32]
platform = espressif32
board = arduino_nano_esp32
framework = arduino
monitor_speed = 115200
build_src_filter =
    +<main.cpp>
    +<app/*.cpp>

lib_deps =
    jgromes/RadioLib
    https://github.com/LoRaMesher/LoRaMesher.git
    bblanchon/ArduinoJson@^7.4.2

build_flags =
    -DBOARD_USES_HW_GPIO_NUMBERS

; Mesh deployment presets:
; - mesh_node_1: client node 1
; - mesh_node_2: client node 2 (forwarder + local sender)
; - mesh_gateway_3: gateway node 3

[env:mesh_node_1]
platform = espressif32
board = arduino_nano_esp32
framework = arduino
monitor_speed = 115200
build_src_filter =
    +<main.cpp>
    +<app/*.cpp>

lib_deps =
    jgromes/RadioLib
    https://github.com/LoRaMesher/LoRaMesher.git
    bblanchon/ArduinoJson@^7.4.2

build_flags =
    -DBOARD_USES_HW_GPIO_NUMBERS
    -DSR_NODE_ID=1
    -DSR_GATEWAY_NODE_ID=3
    -DSR_START_AS_GATEWAY=0
    '-DSR_DEFAULT_DEVICE_ID="dev_mesh_node_1"'
    '-DSR_DEFAULT_DEVICE_SECRET="replace-with-node-1-secret"'

